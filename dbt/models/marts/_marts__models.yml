version: 2

models:
  - name: fct_revenue_funnel
    description: Gold-layer funnel fact table with leakage indicators and stage-age buckets.
    columns:
      - name: lead_id
        tests: [not_null, unique]
      - name: deal_stage
        tests:
          - accepted_values:
              values: ['Prospecting', 'Engaging', 'Won', 'Lost']
      - name: leakage_reason
        tests:
          - accepted_values:
              values: ['stalled_mid_funnel', 'closed_lost_no_value', 'closed_lost_with_value', 'healthy_or_won']
      - name: stage_age_bucket
        tests:
          - accepted_values:
              values: ['not_applicable', '0_to_4_days', '5_to_9_days', '10_to_19_days', '20_plus_days']
      - name: is_leakage_point
        tests: [not_null]

  - name: dim_sales_teams
    description: Gold-layer sales team dimension with operational funnel performance rollups.
    columns:
      - name: sales_agent
        tests: [not_null, unique]
      - name: opportunities_total
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: win_rate
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1

  - name: dim_metric_contract
    description: Governed semantic metric contract used to align BI and AI analytics outputs.
    columns:
      - name: metric_name
        tests: [not_null, unique]
      - name: contract_version
        tests: [not_null]
      - name: effective_from
        tests: [not_null]
      - name: approval_status
        tests:
          - accepted_values:
              values: ['approved']
      - name: approved_by
        tests: [not_null]
      - name: business_definition
        tests: [not_null]
      - name: grain
        tests: [not_null]
      - name: source_model
        tests: [not_null]
      - name: owner_role
        tests: [not_null]

  - name: bi_executive_funnel_overview
    description: BI-safe aggregate view for executive funnel dashboard consumption.
    columns:
      - name: regional_office
        tests: [not_null]
      - name: metric_month
        tests: [not_null]
      - name: total_opportunities
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: win_rate
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: leakage_ratio
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1

  - name: bi_public_sector_executive_overview
    description: BI-safe aggregate view for public-sector executive reporting consumption.
    columns:
      - name: regional_office
        tests: [not_null]
      - name: metric_month
        tests: [not_null]
      - name: total_opportunities
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: win_rate
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: leakage_ratio
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
