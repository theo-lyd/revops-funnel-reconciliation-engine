version: 2

models:
  - name: int_opportunity_enriched
    description: Harmonized opportunity records enriched with account, product, and team context.
    tests:
      - dbt_utils.expression_is_true:
          expression: "deal_stage = 'Prospecting' or engage_date is not null"
    columns:
      - name: opportunity_id
        tests: [not_null, unique]
      - name: deal_stage
        tests: [not_null]

  - name: int_lead_account_matches
    description: Deterministic lead-to-account mapping with match metadata.
    columns:
      - name: lead_id
        tests: [not_null]
      - name: match_type
        tests:
          - accepted_values:
              values: ['exact_name_match', 'unmatched']

  - name: int_lead_account_fuzzy_candidates
    description: Best fuzzy candidate account match for each lead using name similarity heuristics.
    columns:
      - name: lead_id
        tests: [not_null, unique]
      - name: match_type
        tests:
          - accepted_values:
              values: ['exact_name_match', 'lead_prefix_account_match', 'account_prefix_lead_match', 'lead_contains_account_match', 'account_contains_lead_match']
      - name: match_confidence
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1

  - name: int_lead_account_resolved
    description: Resolved lead-to-account mapping prioritizing deterministic then fuzzy matches.
    columns:
      - name: lead_id
        tests: [not_null, unique]
      - name: match_strategy
        tests:
          - accepted_values:
              values: ['deterministic', 'fuzzy', 'unmatched']
      - name: match_confidence_band
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low']

  - name: int_lead_to_opportunity_base
    description: Best candidate lead-to-opportunity mapping for funnel stitching.
    columns:
      - name: lead_id
        tests: [not_null, unique]

  - name: int_funnel_stage_events
    description: Eventized timeline of lead-to-opportunity journey with window-based timing deltas.
    columns:
      - name: lead_id
        tests: [not_null]
      - name: stage_event
        tests:
          - accepted_values:
              values: ['lead_created', 'opportunity_engaged', 'opportunity_closed']

  - name: int_funnel_velocity_metrics
    description: Opportunity-level velocity metrics and stall indicators derived from stage events.
    columns:
      - name: lead_id
        tests: [not_null, unique]
      - name: match_strategy
        tests:
          - accepted_values:
              values: ['deterministic', 'fuzzy', 'unmatched']
      - name: is_mid_funnel_stalled
        tests: [not_null]
      - name: was_slow_closed
        tests: [not_null]
