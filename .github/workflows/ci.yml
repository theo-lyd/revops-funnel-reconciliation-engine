name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Lint and type-check
        run: |
          ruff check .
          mypy src scripts dags

      - name: Unit tests
        run: pytest -q

      - name: Prepare dbt workspace
        run: |
          mkdir -p data/warehouse
          python scripts/ingest/load_leads_jsonl_to_duckdb.py
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml
          python scripts/init_warehouse.py
          python scripts/ingest/load_crm_csv_to_duckdb.py
          cd dbt
          dbt deps
          dbt parse --profiles-dir profiles

      - name: dbt changed-model build and test (pull requests)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          BASE_REF="${GITHUB_BASE_REF:-${GITHUB_EVENT_BEFORE:-origin/master}}"
          python scripts/ops/run_changed_model_dbt.py build --base-ref "$BASE_REF" --strict-selector
          python scripts/ops/run_changed_model_dbt.py test --base-ref "$BASE_REF" --strict-selector

      - name: dbt full build and test (master pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd dbt
          dbt build --profiles-dir profiles --select path:models/staging path:models/intermediate path:models/marts
          dbt test --profiles-dir profiles

      - name: Upload selector decision artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selector-decision-${{ github.run_id }}
          path: artifacts/ci/selector_decision.json
          if-no-files-found: ignore

      - name: Great Expectations validation
        run: python scripts/quality/run_great_expectations.py

  deployment-integration:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Create synthetic promotion report
        run: |
          mkdir -p artifacts/promotions
          cat <<'JSON' > artifacts/promotions/deployment_promotion.json
          {
            "release_id": "ci-integration",
            "deployment_environment": "production",
            "promotion_decision": "approved"
          }
          JSON

      - name: Generate rollback manifest artifact
        run: |
          python scripts/ops/rollback_deployment.py \
            --release-id ci-integration \
            --rollback-reason integration-test \
            --rollback-trigger github-actions \
            --promotion-report artifacts/promotions/deployment_promotion.json \
            --output artifacts/promotions/deployment_rollback.json

      - name: Execute rollback playbook (dry-run)
        run: |
          python scripts/ops/execute_rollback_playbook.py \
            --rollback-report artifacts/promotions/deployment_rollback.json \
            --output artifacts/promotions/deployment_rollback_execution_dry_run.json

      - name: Execute rollback playbook (controlled)
        run: |
          python scripts/ops/execute_rollback_playbook.py \
            --rollback-report artifacts/promotions/deployment_rollback.json \
            --execute \
            --output artifacts/promotions/deployment_rollback_execution_controlled.json

      - name: Dispatch rollback incident (safe skip mode)
        run: |
          python scripts/ops/dispatch_rollback_incident.py \
            --incident-payload artifacts/promotions/rollback_incident_payload.json \
            --output artifacts/promotions/rollback_incident_dispatch.json

      - name: Create synthetic dead-letter artifact
        run: |
          cat <<'JSON' > artifacts/promotions/rollback_incident_dead_letter.json
          {
            "release_id": "ci-integration",
            "environment": "production",
            "last_error": "synthetic-ci-dead-letter"
          }
          JSON

      - name: Escalate dead-letter (safe skip mode)
        run: |
          python scripts/ops/escalate_rollback_dead_letter.py \
            --dead-letter artifacts/promotions/rollback_incident_dead_letter.json \
            --output artifacts/promotions/rollback_dead_letter_escalation.json

      - name: Upload deployment integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-integration-${{ github.run_id }}
          path: |
            artifacts/promotions/deployment_rollback.json
            artifacts/promotions/deployment_rollback_execution_dry_run.json
            artifacts/promotions/deployment_rollback_execution_controlled.json
            artifacts/promotions/release_lock.json
            artifacts/promotions/rollback_incident_payload.json
            artifacts/promotions/rollback_incident_dispatch.json
            artifacts/promotions/rollback_incident_dead_letter.json
            artifacts/promotions/rollback_dead_letter_escalation.json
          if-no-files-found: ignore

  production-parity-check:
    # Run only on pushes to master with Snowflake credentials available (deployment contexts)
    # Local contributors and PRs without secrets will not be blocked by this job
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      secrets.SNOWFLAKE_ACCOUNT != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Setup DuckDB warehouse
        run: |
          mkdir -p data/warehouse
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml
          python scripts/init_warehouse.py
          python scripts/ingest/load_crm_csv_to_duckdb.py

      - name: Build local Gold layer
        run: |
          cd dbt
          dbt deps
          dbt build --profiles-dir profiles --select path:models/staging path:models/intermediate path:models/marts

      - name: Run strict metric parity check (DuckDB vs Snowflake)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_QUERY_TAG: ci-pipeline-parity-check
          PARITY_TOLERANCE_STRICT: '0.0'
        run: make metric-parity-check-strict
