name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Lint and type-check
        run: |
          ruff check .
          mypy src scripts dags

      - name: Unit tests
        run: pytest -q

      - name: Prepare dbt workspace
        run: |
          mkdir -p data/warehouse
          python scripts/ingest/load_leads_jsonl_to_duckdb.py
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml
          python scripts/init_warehouse.py
          python scripts/ingest/load_crm_csv_to_duckdb.py
          cd dbt
          dbt deps
          dbt parse --profiles-dir profiles

      - name: dbt changed-model build and test (pull requests)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          BASE_REF="${GITHUB_BASE_REF:-${GITHUB_EVENT_BEFORE:-origin/master}}"
          python scripts/ops/run_changed_model_dbt.py build --base-ref "$BASE_REF" --strict-selector
          python scripts/ops/run_changed_model_dbt.py test --base-ref "$BASE_REF" --strict-selector

      - name: dbt full build and test (master pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd dbt
          dbt build --profiles-dir profiles --select path:models/staging path:models/intermediate path:models/marts
          dbt test --profiles-dir profiles

      - name: Upload selector decision artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selector-decision-${{ github.run_id }}
          path: artifacts/ci/selector_decision.json
          if-no-files-found: ignore

      - name: Great Expectations validation
        run: python scripts/quality/run_great_expectations.py

  deployment-integration:
    needs: quality
    runs-on: ubuntu-latest
    env:
      PHASE82_ENABLE: ${{ vars.PHASE82_ENABLE || 'false' }}
      PHASE82_TEAM_TAG_MAPPING: ${{ vars.PHASE82_TEAM_TAG_MAPPING || '' }}
      PHASE82_BUDGET_THRESHOLD_PCT: ${{ vars.PHASE82_BUDGET_THRESHOLD_PCT || '80' }}
      PHASE82_STAGING_TO_PROD_MULTIPLIER: ${{ vars.PHASE82_STAGING_TO_PROD_MULTIPLIER || '5.0' }}
      PHASE82_WAREHOUSE_DAILY_BUDGET_CREDITS: ${{ vars.PHASE82_WAREHOUSE_DAILY_BUDGET_CREDITS || '100' }}
      PHASE82_WAREHOUSE_CURRENT_DAILY_BURN: ${{ vars.PHASE82_WAREHOUSE_CURRENT_DAILY_BURN || '45.6' }}
      PHASE82_PROD_CURRENT_MONTHLY_COST: ${{ vars.PHASE82_PROD_CURRENT_MONTHLY_COST || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Create synthetic promotion report
        run: |
          mkdir -p artifacts/promotions
          cat <<'JSON' > artifacts/promotions/deployment_promotion.json
          {
            "release_id": "ci-integration",
            "deployment_environment": "production",
            "promotion_decision": "approved"
          }
          JSON

      - name: Generate rollback manifest artifact
        run: |
          python scripts/ops/rollback_deployment.py \
            --release-id ci-integration \
            --rollback-reason integration-test \
            --rollback-trigger github-actions \
            --promotion-report artifacts/promotions/deployment_promotion.json \
            --output artifacts/promotions/deployment_rollback.json

      - name: Execute rollback playbook (dry-run)
        run: |
          python scripts/ops/execute_rollback_playbook.py \
            --rollback-report artifacts/promotions/deployment_rollback.json \
            --output artifacts/promotions/deployment_rollback_execution_dry_run.json

      - name: Execute rollback playbook (controlled)
        run: |
          python scripts/ops/execute_rollback_playbook.py \
            --rollback-report artifacts/promotions/deployment_rollback.json \
            --execute \
            --output artifacts/promotions/deployment_rollback_execution_controlled.json

      - name: Dispatch rollback incident (safe skip mode)
        run: |
          python scripts/ops/dispatch_rollback_incident.py \
            --incident-payload artifacts/promotions/rollback_incident_payload.json \
            --output artifacts/promotions/rollback_incident_dispatch.json

      - name: Create synthetic dead-letter artifact
        run: |
          cat <<'JSON' > artifacts/promotions/rollback_incident_dead_letter.json
          {
            "release_id": "ci-integration",
            "environment": "production",
            "last_error": "synthetic-ci-dead-letter"
          }
          JSON

      - name: Escalate dead-letter (safe skip mode)
        run: |
          python scripts/ops/escalate_rollback_dead_letter.py \
            --dead-letter artifacts/promotions/rollback_incident_dead_letter.json \
            --output artifacts/promotions/rollback_dead_letter_escalation.json

      - name: Generate query-cost attribution (safe skip mode)
        run: |
          python scripts/ops/generate_query_cost_attribution.py \
            --lookback-hours 24 \
            --max-queries 200 \
            --output artifacts/performance/query_cost_attribution_report.json

      - name: Check query-cost regression (safe skip mode)
        env:
          COST_MAX_NEW_QUERY_TAGS: ${{ vars.COST_MAX_NEW_QUERY_TAGS || '0' }}
        run: |
          python scripts/ops/check_query_cost_regression.py \
            --current-report artifacts/performance/query_cost_attribution_report.json \
            --baseline-report artifacts/performance/query_cost_attribution_baseline.json \
            --max-credits-regression-pct 20 \
            --max-elapsed-regression-pct 25 \
            --max-new-query-tags "$COST_MAX_NEW_QUERY_TAGS" \
            --output artifacts/performance/query_cost_regression_report.json

      - name: Run Phase 8.2 enhanced cost signals (safe mode)
        if: env.PHASE82_ENABLE == 'true'
        run: |
          python scripts/ops/forecast_query_cost_budget.py \
            --attribution-report artifacts/performance/query_cost_attribution_report.json \
            --team-owner-tag-mapping "$PHASE82_TEAM_TAG_MAPPING" \
            --budget-threshold-pct "$PHASE82_BUDGET_THRESHOLD_PCT" \
            --staging-to-prod-multiplier "$PHASE82_STAGING_TO_PROD_MULTIPLIER" \
            --output artifacts/performance/query_cost_forecast_report.json

          python scripts/ops/analyze_query_patterns.py \
            --attribution-report artifacts/performance/query_cost_attribution_report.json \
            --output artifacts/performance/query_pattern_analysis.json

          python scripts/ops/generate_execution_phase_attribution.py \
            --dbt-budget-report artifacts/performance/dbt_build_prod_report.json \
            --output artifacts/performance/execution_phase_attribution.json

          python scripts/ops/estimate_cross_environment_impact.py \
            --staging-report artifacts/performance/query_cost_attribution_report.json \
            --prod-current "$PHASE82_PROD_CURRENT_MONTHLY_COST" \
            --staging-to-prod-multiplier "$PHASE82_STAGING_TO_PROD_MULTIPLIER" \
            --output artifacts/performance/cross_environment_forecast.json

          python scripts/ops/emit_warehouse_cost_estimate.py \
            --daily-budget-credits "$PHASE82_WAREHOUSE_DAILY_BUDGET_CREDITS" \
            --current-daily-burn "$PHASE82_WAREHOUSE_CURRENT_DAILY_BURN" \
            --output artifacts/performance/warehouse_cost_estimate.json

          python scripts/ops/analyze_pr_cost_impact.py \
            --baseline-monthly-cost 500 \
            --output artifacts/performance/pr_cost_impact_score.json

          python scripts/ops/generate_cost_optimization_runbooks.py \
            --pattern-analysis artifacts/performance/query_pattern_analysis.json \
            --output artifacts/performance/optimization_runbooks.json

      - name: Run production health checks (safe skip mode)
        run: |
          python scripts/ops/run_health_checks.py \
            --max-freshness-hours 24 \
            --max-job-duration-minutes 120 \
            --output artifacts/monitoring/health_report.json

      - name: Generate operational dashboards (safe skip mode)
        run: |
          python scripts/ops/generate_operational_dashboards.py \
            --health-report artifacts/monitoring/health_report.json \
            --cost-report artifacts/monitoring/query_cost_attribution.json \
            --performance-report artifacts/performance/dbt_build_prod_report.json \
            --output artifacts/monitoring/operational_dashboard.json

      - name: Generate on-call runbook (safe skip mode)
        run: |
          python scripts/ops/run_oncall_runbooks.py \
            --health-report artifacts/monitoring/health_report.json \
            --dashboard-report artifacts/monitoring/operational_dashboard.json \
            --rollback-report artifacts/promotions/deployment_rollback_execution_controlled.json \
            --incident-dispatch-report artifacts/promotions/rollback_incident_dispatch.json \
            --dead-letter-escalation-report artifacts/promotions/rollback_dead_letter_escalation.json \
            --output artifacts/runbooks/oncall_runbook_report.json

      - name: Generate incident operations report (safe mode)
        run: |
          python scripts/ops/run_incident_operations.py \
            --health-report artifacts/monitoring/health_report.json \
            --dashboard-report artifacts/monitoring/operational_dashboard.json \
            --runbook-report artifacts/runbooks/oncall_runbook_report.json \
            --dispatch-report artifacts/promotions/rollback_incident_dispatch.json \
            --escalation-report artifacts/promotions/rollback_dead_letter_escalation.json \
            --output artifacts/runbooks/incident_operations_report.json

      - name: Run Phase 11 validation/backtesting (safe mode)
        run: |
          python scripts/ops/run_validation_backtesting.py \
            --current-cost-report artifacts/performance/query_cost_attribution_report.json \
            --baseline-cost-report artifacts/performance/query_cost_attribution_baseline.json \
            --regression-report artifacts/performance/query_cost_regression_report.json \
            --forecast-report artifacts/performance/query_cost_forecast_report.json \
            --cross-environment-report artifacts/performance/cross_environment_forecast.json \
            --pr-impact-report artifacts/performance/pr_cost_impact_score.json \
            --health-report artifacts/monitoring/health_report.json \
            --dashboard-report artifacts/monitoring/operational_dashboard.json \
            --runbook-report artifacts/runbooks/oncall_runbook_report.json \
            --incident-operations-report artifacts/runbooks/incident_operations_report.json \
            --output artifacts/validation/validation_backtesting_report.json

      - name: Summarize failure-path observability (safe skip)
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def status(path: str, key: str) -> str:
              p = Path(path)
              if not p.exists():
                  return "missing"
              try:
                  payload = json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return "invalid-json"
              return str(payload.get(key, "unknown"))

          print("Phase 7/9 Deployment Integration Summary")
          print(f"- rollback_execution_controlled: {status('artifacts/promotions/deployment_rollback_execution_controlled.json', 'execution_mode')}")
          print(f"- incident_dispatch: {status('artifacts/promotions/rollback_incident_dispatch.json', 'dispatch_status')}")
          print(f"- dead_letter_escalation: {status('artifacts/promotions/rollback_dead_letter_escalation.json', 'escalation_status')}")
          print(f"- oncall_runbook: {status('artifacts/runbooks/oncall_runbook_report.json', 'overall_status')}")
          PY

      - name: Upload deployment integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-integration-${{ github.run_id }}
          path: |
            artifacts/promotions/deployment_rollback.json
            artifacts/promotions/deployment_rollback_execution_dry_run.json
            artifacts/promotions/deployment_rollback_execution_controlled.json
            artifacts/promotions/release_lock.json
            artifacts/promotions/rollback_incident_payload.json
            artifacts/promotions/rollback_incident_dispatch.json
            artifacts/promotions/rollback_incident_dead_letter.json
            artifacts/promotions/rollback_dead_letter_escalation.json
            artifacts/performance/query_cost_attribution_report.json
            artifacts/performance/query_cost_regression_report.json
            artifacts/performance/query_cost_forecast_report.json
            artifacts/performance/query_pattern_analysis.json
            artifacts/performance/execution_phase_attribution.json
            artifacts/performance/cross_environment_forecast.json
            artifacts/performance/warehouse_cost_estimate.json
            artifacts/performance/pr_cost_impact_score.json
            artifacts/performance/optimization_runbooks.json
            artifacts/monitoring/health_report.json
            artifacts/monitoring/operational_dashboard.json
            artifacts/runbooks/oncall_runbook_report.json
            artifacts/runbooks/incident_operations_report.json
            artifacts/validation/validation_backtesting_report.json
          if-no-files-found: ignore

  production-parity-check:
    # Run only on pushes to master with Snowflake credentials available (deployment contexts)
    # Local contributors and PRs without secrets will not be blocked by this job
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      secrets.SNOWFLAKE_ACCOUNT != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Setup DuckDB warehouse
        run: |
          mkdir -p data/warehouse
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml
          python scripts/init_warehouse.py
          python scripts/ingest/load_crm_csv_to_duckdb.py

      - name: Build local Gold layer
        run: |
          cd dbt
          dbt deps
          dbt build --profiles-dir profiles --select path:models/staging path:models/intermediate path:models/marts

      - name: Run strict metric parity check (DuckDB vs Snowflake)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_QUERY_TAG: ci-pipeline-parity-check
          PARITY_TOLERANCE_STRICT: '0.0'
        run: make metric-parity-check-strict
