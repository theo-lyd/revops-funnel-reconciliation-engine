name: Release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release identifier to record in the promotion manifest
        required: false
        default: manual-release

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    env:
      PARITY_REPORT_PATH: artifacts/parity/metric_parity_report.json
      CACHE_REFRESH_REPORT_PATH: artifacts/cache/cache_refresh.json
      DEPLOYMENT_PROMOTION_REPORT_PATH: artifacts/promotions/deployment_promotion.json
      DEPLOYMENT_ROLLBACK_REPORT_PATH: artifacts/promotions/deployment_rollback.json
      DEPLOYMENT_ROLLBACK_EXECUTION_REPORT_PATH: artifacts/promotions/deployment_rollback_execution.json
      DEPLOYMENT_ROLLBACK_INCIDENT_PAYLOAD_PATH: artifacts/promotions/rollback_incident_payload.json
      DEPLOYMENT_ROLLBACK_INCIDENT_DISPATCH_REPORT_PATH: artifacts/promotions/rollback_incident_dispatch.json
      DEPLOYMENT_ROLLBACK_INCIDENT_DEAD_LETTER_PATH: artifacts/promotions/rollback_incident_dead_letter.json
      DEPLOYMENT_ROLLBACK_ESCALATION_REPORT_PATH: artifacts/promotions/rollback_dead_letter_escalation.json

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate release branch access
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/master" ]]; then
            echo "Release workflow is restricted to master branch. Current ref: $GITHUB_REF"
            exit 1
          fi

      - name: Validate release actor access
        env:
          RELEASE_ALLOWED_ACTORS: ${{ secrets.RELEASE_ALLOWED_ACTORS }}
        run: |
          if [[ -z "$RELEASE_ALLOWED_ACTORS" ]]; then
            echo "RELEASE_ALLOWED_ACTORS not configured; allowing actor $GITHUB_ACTOR"
            exit 0
          fi
          allowed=",$RELEASE_ALLOWED_ACTORS,"
          actor=",$GITHUB_ACTOR,"
          if [[ "$allowed" != *"$actor"* ]]; then
            echo "Actor '$GITHUB_ACTOR' is not authorized for release workflow"
            echo "Set RELEASE_ALLOWED_ACTORS secret to a comma-separated allowlist"
            exit 1
          fi

      - name: Materialize Snowflake private key (optional)
        env:
          SNOWFLAKE_PRIVATE_KEY_PEM: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PEM }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          if [[ -n "$SNOWFLAKE_PRIVATE_KEY_PEM" ]]; then
            mkdir -p .secrets
            printf '%s\n' "$SNOWFLAKE_PRIVATE_KEY_PEM" > .secrets/snowflake_private_key.p8
            chmod 600 .secrets/snowflake_private_key.p8
            echo "SNOWFLAKE_PRIVATE_KEY_PATH=$GITHUB_WORKSPACE/.secrets/snowflake_private_key.p8" >> $GITHUB_ENV
            if [[ -n "$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" ]]; then
              echo "SNOWFLAKE_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" >> $GITHUB_ENV
            fi
            echo "Configured Snowflake key-pair authentication for release workflow"
          else
            echo "SNOWFLAKE_PRIVATE_KEY_PEM not set; release workflow will use password auth if configured"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.10.txt"
          pip install -r requirements/base.txt -r requirements/dev.txt

      - name: Setup DuckDB warehouse for parity baseline
        run: |
          mkdir -p data/warehouse
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml
          python scripts/init_warehouse.py
          python scripts/ingest/load_crm_csv_to_duckdb.py

      - name: Build local Gold layer for parity
        run: |
          cd dbt
          dbt deps
          dbt build --profiles-dir profiles --select path:models/staging path:models/intermediate path:models/marts

      - name: Build and test production models
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          DBT_THREADS_PROD: ${{ vars.DBT_THREADS_PROD || '4' }}
          DBT_MAX_THREADS_LOCAL: ${{ vars.DBT_MAX_THREADS_LOCAL || '2' }}
          DBT_MAX_THREADS_PROD: ${{ vars.DBT_MAX_THREADS_PROD || '4' }}
          DBT_TIMEOUT_SECONDS_LOCAL: ${{ vars.DBT_TIMEOUT_SECONDS_LOCAL || '900' }}
          DBT_TIMEOUT_SECONDS_PROD: ${{ vars.DBT_TIMEOUT_SECONDS_PROD || '1800' }}
          DBT_PROD_SELECTOR: ${{ vars.DBT_PROD_SELECTOR || 'path:models/staging path:models/intermediate path:models/marts' }}
        run: make dbt-deploy-prod

      - name: Run strict metric parity gate
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python scripts/quality/run_metric_parity_check.py \
            --strict-snowflake \
            --output-json "$PARITY_REPORT_PATH"

      - name: Refresh runtime caches
        run: |
          python scripts/ops/refresh_runtime_caches.py --output "$CACHE_REFRESH_REPORT_PATH"

      - name: Create deployment promotion manifest
        env:
          DEPLOYMENT_PROMOTION_ENABLED: 'true'
          RELEASE_ID: ${{ inputs.release_id }}
          DBT_BASE_REF: ${{ github.ref_name }}
        run: |
          python scripts/ops/promote_deployment.py \
            --parity-report "$PARITY_REPORT_PATH" \
            --cache-refresh-report "$CACHE_REFRESH_REPORT_PATH" \
            --output "$DEPLOYMENT_PROMOTION_REPORT_PATH"

      - name: Create rollback manifest on failure
        if: failure()
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          ROLLBACK_REASON: release-workflow-failure
          ROLLBACK_TRIGGER: github-actions
          RELEASE_ALLOWED_ACTORS: ${{ secrets.RELEASE_ALLOWED_ACTORS }}
        run: |
          python scripts/ops/rollback_deployment.py \
            --require-release-access \
            --promotion-report "$DEPLOYMENT_PROMOTION_REPORT_PATH" \
            --output "$DEPLOYMENT_ROLLBACK_REPORT_PATH"

      - name: Execute rollback playbook on failure
        if: failure()
        env:
          ROLLBACK_EXECUTION_ENABLED: ${{ vars.ROLLBACK_EXECUTION_ENABLED || 'false' }}
          RELEASE_ALLOWED_ACTORS: ${{ secrets.RELEASE_ALLOWED_ACTORS }}
        run: |
          MODE_FLAG=""
          if [[ "$ROLLBACK_EXECUTION_ENABLED" == "true" ]]; then
            MODE_FLAG="--execute"
            echo "Rollback playbook execution is enabled"
          else
            echo "Rollback playbook execution disabled; running dry-run"
          fi

          python scripts/ops/execute_rollback_playbook.py \
            --rollback-report "$DEPLOYMENT_ROLLBACK_REPORT_PATH" \
            --environment production \
            --require-release-access \
            --output "$DEPLOYMENT_ROLLBACK_EXECUTION_REPORT_PATH" \
            $MODE_FLAG

      - name: Dispatch rollback incident notification on failure
        if: failure()
        env:
          ROLLBACK_INCIDENT_WEBHOOK_URL: ${{ secrets.ROLLBACK_INCIDENT_WEBHOOK_URL }}
          ROLLBACK_INCIDENT_WEBHOOK_TOKEN: ${{ secrets.ROLLBACK_INCIDENT_WEBHOOK_TOKEN }}
          ROLLBACK_INCIDENT_STRICT: ${{ vars.ROLLBACK_INCIDENT_STRICT || 'false' }}
          ROLLBACK_INCIDENT_MAX_ATTEMPTS: ${{ vars.ROLLBACK_INCIDENT_MAX_ATTEMPTS || '3' }}
          ROLLBACK_INCIDENT_BACKOFF_SECONDS: ${{ vars.ROLLBACK_INCIDENT_BACKOFF_SECONDS || '2' }}
        run: |
          STRICT_FLAG=""
          if [[ "$ROLLBACK_INCIDENT_STRICT" == "true" ]]; then
            STRICT_FLAG="--strict"
          fi

          python scripts/ops/dispatch_rollback_incident.py \
            --incident-payload "$DEPLOYMENT_ROLLBACK_INCIDENT_PAYLOAD_PATH" \
            --max-attempts "$ROLLBACK_INCIDENT_MAX_ATTEMPTS" \
            --backoff-seconds "$ROLLBACK_INCIDENT_BACKOFF_SECONDS" \
            --dead-letter-output "$DEPLOYMENT_ROLLBACK_INCIDENT_DEAD_LETTER_PATH" \
            --output "$DEPLOYMENT_ROLLBACK_INCIDENT_DISPATCH_REPORT_PATH" \
            $STRICT_FLAG

      - name: Escalate rollback dead-letter on failure
        if: failure()
        env:
          ROLLBACK_ESCALATION_WEBHOOK_URL: ${{ secrets.ROLLBACK_ESCALATION_WEBHOOK_URL }}
          ROLLBACK_ESCALATION_WEBHOOK_TOKEN: ${{ secrets.ROLLBACK_ESCALATION_WEBHOOK_TOKEN }}
          ROLLBACK_ESCALATION_STRICT: ${{ vars.ROLLBACK_ESCALATION_STRICT || 'false' }}
          ROLLBACK_ESCALATION_MAX_ATTEMPTS: ${{ vars.ROLLBACK_ESCALATION_MAX_ATTEMPTS || '2' }}
          ROLLBACK_ESCALATION_BACKOFF_SECONDS: ${{ vars.ROLLBACK_ESCALATION_BACKOFF_SECONDS || '3' }}
        run: |
          STRICT_FLAG=""
          if [[ "$ROLLBACK_ESCALATION_STRICT" == "true" ]]; then
            STRICT_FLAG="--strict"
          fi

          python scripts/ops/escalate_rollback_dead_letter.py \
            --dead-letter "$DEPLOYMENT_ROLLBACK_INCIDENT_DEAD_LETTER_PATH" \
            --max-attempts "$ROLLBACK_ESCALATION_MAX_ATTEMPTS" \
            --backoff-seconds "$ROLLBACK_ESCALATION_BACKOFF_SECONDS" \
            --output "$DEPLOYMENT_ROLLBACK_ESCALATION_REPORT_PATH" \
            $STRICT_FLAG

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts-${{ github.run_id }}
          path: |
            artifacts/parity/metric_parity_report.json
            artifacts/cache/cache_refresh.json
            artifacts/performance/dbt_build_prod_report.json
            artifacts/performance/dbt_test_prod_report.json
            artifacts/promotions/deployment_promotion.json
            artifacts/promotions/deployment_rollback.json
            artifacts/promotions/deployment_rollback_execution.json
            artifacts/promotions/release_lock.json
            artifacts/promotions/rollback_incident_payload.json
            artifacts/promotions/rollback_incident_dispatch.json
            artifacts/promotions/rollback_incident_dead_letter.json
            artifacts/promotions/rollback_dead_letter_escalation.json
          if-no-files-found: ignore
